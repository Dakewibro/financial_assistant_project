services:
  - type: web
    name: financial-assistant-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: financial_assistant
      - key: ALLOWED_ORIGINS
        sync: false
