services:
  - type: web
    name: financial-assistant-backend
    env: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: STORAGE_MODE
        value: mongo
      - key: MONGODB_DB
        value: financial_assistant
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
